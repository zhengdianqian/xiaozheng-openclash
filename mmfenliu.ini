[custom]
; ==========================================================
; 终极稳定版：Gemini(首选日本) + Google + 独立分流
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; 1. 彻底禁用过滤，确保 hy2 和 全球通 节点能全数进入
; 已经移除了所有的 exclude 规则

; 2. 规则集 (自上而下匹配，Gemini 必须最靠前)
ruleset=🤖 Gemini,[]GEOSITE,gemini
ruleset=🤖 Gemini,[]GEOSITE,google-fcm
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🔎 Google,[]GEOSITE,google
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn
ruleset=🧑‍💻 GitHub,[]GEOSITE,github
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=DIRECT,[]GEOSITE,cn
ruleset=🚀 手动选择,[]GEOSITE,gfw
ruleset=🐟 漏网之鱼,[]FINAL

; 3. 策略组 (适配你的节点：美国/香港/日本 hy2 & 全球通)
; 核心默认出口
custom_proxy_group=🌐 节点选择`select`[]🇯🇵 日本节点`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]♻️ 自动选择`[]🚀 全部节点
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; 区域匹配 (采用最宽泛的正则，确保能抓到你的 hy2 节点)
custom_proxy_group=🇭🇰 香港节点`url-test`(香港|港|HK|Hong Kong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(日本|日|JP|Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(美国|美|US|United States)`http://www.gstatic.com/generate_204`300,,50

; 【防错机制】这个分组会抓取你订阅里的所有节点，它是防止 No node 报错的最后防线
custom_proxy_group=🚀 全部节点`select`.*

; 4. 应用层精准控制
; Gemini 默认日本，如不可用手动切美国
custom_proxy_group=🤖 Gemini`select`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🌐 节点选择`[]DIRECT
custom_proxy_group=🔎 Google`select`[]🌐 节点选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]DIRECT
custom_proxy_group=🎬 YouTube`select`[]🌐 节点选择`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点
custom_proxy_group=📨 Telegram`select`[]🌐 节点选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点
custom_proxy_group=🧠 AI`select`[]🇺🇸 美国节点`[]🌐 节点选择
custom_proxy_group=🚀 手动选择`select`[]🌐 节点选择`[]DIRECT`.*
custom_proxy_group=🐟 漏网之鱼`select`[]🌐 节点选择`[]DIRECT
