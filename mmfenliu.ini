[custom]
enable_rule_generator=true
overwrite_original_rules=true

; 1. 彻底禁用过滤（这一步最关键！防止误伤你的 hy2 节点）
; 将原本开头的 exclude=... 全部删掉或者加分号注释掉

; 2. 规则分组 (优先级：Gemini > YouTube > Google)
ruleset=🤖 Gemini,[]GEOSITE,gemini
ruleset=🤖 Gemini,[]GEOSITE,google-fcm
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🔎 Google,[]GEOSITE,google
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🧠 其他 AI,[]GEOSITE,category-ai-!cn
ruleset=DIRECT,[]GEOSITE,cn
ruleset=🚀 手动选择,[]GEOSITE,gfw
ruleset=🐟 漏网之鱼,[]FINAL

; 3. 策略组 (适配你的节点名：美国hy2, 香港全球通 等)
; 基础选择：增加一个“全部节点”作为兜底，如果这里有节点，说明正则没问题
custom_proxy_group=🌐 Default`select`[]🇯🇵 日本节点`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]♻️ 自动选择`[]🚀 全部节点
custom_proxy_group=🚀 全部节点`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; 区域匹配 (精准抓取你的关键字)
custom_proxy_group=🇭🇰 香港节点`url-test`(香港|HK|Hong Kong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(日本|JP|Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(美国|US|United States)`http://www.gstatic.com/generate_204`300,,50

; 应用层精准控制
; Gemini 默认走日本，满足你的需求
custom_proxy_group=🤖 Gemini`select`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🌐 Default`[]DIRECT
custom_proxy_group=🔎 Google`select`[]🌐 Default`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]DIRECT
custom_proxy_group=🎬 YouTube`select`[]🌐 Default`[]🇺🇸 美国节点`[]🇭🇰 香港节点
custom_proxy_group=📨 Telegram`select`[]🌐 Default`[]🇭🇰 香港节点`[]🇺🇸 美国节点
custom_proxy_group=🚀 手动选择`select`[]🌐 Default`[]DIRECT`.*
custom_proxy_group=🐟 漏网之鱼`select`[]🌐 Default`[]DIRECT
