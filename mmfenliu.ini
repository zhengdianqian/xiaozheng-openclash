[custom]
; ==========================================================
; 方案 B 极致优化版：新增 Gemini (首选日本), Google, YouTube 独立控制
; ==========================================================

enable_rule_generator=true
overwrite_original_rules=true

; 节点清洗：剔除无用信息

; ==========================================================
; 1) 规则（自上而下优先级：具体应用 > 通用分组 > 兜底）
; ==========================================================
; --- 特殊拦截 ---
ruleset=🟥 Adobe,[]GEOSITE,adobe
ruleset=🟥 Adobe,[]GEOIP,adobe,no-resolve

; --- 私网与 Aethersailor 补丁 ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

; --- 【核心】AI 分离逻辑 ---
; 必须将 Gemini 放在 Google 之前，防止被 Google 规则误拦截
ruleset=🤖 Gemini,[]GEOSITE,gemini
ruleset=🤖 Gemini,[]GEOSITE,google-fcm
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🧠 其他 AI,[]GEOSITE,category-ai-!cn

; --- 核心 Google 系 ---
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🔎 Google,[]GEOSITE,google
ruleset=🔎 Google,[]GEOIP,google,no-resolve

; --- 社交与通讯 ---
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=📨 Telegram,[]GEOIP,telegram,no-resolve
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve
ruleset=🎬 Disney+,[]GEOSITE,disney
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=📸 Instagram,[]GEOSITE,instagram
ruleset=🐦 X,[]GEOSITE,twitter

; --- 开发与工具 ---
ruleset=🧑‍💻 GitHub,[]GEOSITE,github
ruleset=📦 Notion,[]GEOSITE,notion
ruleset=🍎 Apple,[]GEOSITE,apple
ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest

; --- 金融交易所 ---
ruleset=🟦 OKX,[]GEOSITE,okx
ruleset=🟨 Binance,[]GEOSITE,binance
ruleset=🟪 Bybit,[]GEOSITE,bybit

; --- 国内直连与 GFW 兜底 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=🚀 兜底选择,[]GEOSITE,gfw
ruleset=🐟 漏网之鱼,[]FINAL

; ==========================================================
; 2) 策略组定义
; ==========================================================

; --- 基础出口 ---
custom_proxy_group=🌐 Default`select`[]🇯🇵 JP`[]🇭🇰 HK`[]🇹🇼 TW`[]🇸🇬 SG`[]🇺🇸 US`[]🧭 手动选择`[]♻️ 自动选择
custom_proxy_group=🧭 手动选择`select`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; ==========================================================
; 2) 区域选择（针对你的节点名：美国hy2, 香港全球通 等）
; ==========================================================
; 这里的正则会精准抓取包含“香港”或“HK”的节点
custom_proxy_group=🇭🇰 HK`url-test`(港|HK|Hong Kong)`http://www.gstatic.com/generate_204`300,,50

; 这里的正则会精准抓取包含“日本”或“JP”的节点
custom_proxy_group=🇯🇵 JP`url-test`(日|JP|Japan)`http://www.gstatic.com/generate_204`300,,50

; 这里的正则会精准抓取包含“美国”或“US”的节点
custom_proxy_group=🇺🇸 US`url-test`(美|US|United States)`http://www.gstatic.com/generate_204`300,,50

; 这里的正则抓取包含“台湾”或“TW”的节点（如果有的话）
custom_proxy_group=🇹🇼 TW`url-test`(台|TW|Taiwan)`http://www.gstatic.com/generate_204`300,,50

; 这里的正则抓取包含“新加坡”或“SG”的节点（如果有的话）
custom_proxy_group=🇸🇬 SG`url-test`(新|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50

; 【重要】万能兜底组：如果上面都没匹配到，这个组会显示所有节点，防止报错
custom_proxy_group=🚀 全部节点`select`.*


; --- 应用层精准控制 ---
; Gemini 默认走日本，手动选择里也保留了其他区域
custom_proxy_group=🤖 Gemini`select`[]🇯🇵 JP`[]🇺🇸 US`[]🇸🇬 SG`[]🇹🇼 TW`[]🌐 Default`[]DIRECT
custom_proxy_group=🔎 Google`select`[]🌐 Default`[]🇭🇰 HK`[]🇯🇵 JP`[]🇺🇸 US`[]DIRECT
custom_proxy_group=🎬 YouTube`select`[]🌐 Default`[]🇺🇸 US`[]🇭🇰 HK`[]🇯🇵 JP
custom_proxy_group=📨 Telegram`select`[]🌐 Default`[]🇸🇬 SG`[]🇭🇰 HK`[]🇺🇸 US
custom_proxy_group=🤖 ChatGPT`select`[]🇺🇸 US`[]🇸🇬 SG`[]🇯🇵 JP`[]🌐 Default
custom_proxy_group=🧠 其他 AI`select`[]🇺🇸 US`[]🇸🇬 SG`[]🌐 Default
custom_proxy_group=🎥 Netflix`select`[]🌐 Default`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP
custom_proxy_group=🎬 Disney+`select`[]🇺🇸 US`[]🇸🇬 SG`[]🌐 Default
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🌐 Default`[]🇺🇸 US
custom_proxy_group=🚀 兜底选择`select`[]🌐 Default`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🌐 Default`[]DIRECT`[]🧭 手动选择
